groups:
  - name: lti_antiphishing
    interval: 30s
    rules:
      - alert: HighQuarantineRate
        expr: rate(quarantine_emails_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High quarantine rate detected"
          description: "More than 10 emails quarantined per minute in the last 5 minutes"

      - alert: ClassifierDown
        expr: up{job="classifier"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Classifier service is down"
          description: "The ML classifier service has been unreachable for over 1 minute"

      - alert: HighLatency
        expr: classifier_prediction_duration_seconds{quantile="0.95"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High prediction latency"
          description: "95th percentile of prediction latency exceeds 5 seconds"

      - alert: AnomalySpike
        expr: avg(anomaly_score) > 0.7
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Anomaly score spike detected"
          description: "Average anomaly score across all emails exceeds 0.7"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage exceeds 80% of max"
