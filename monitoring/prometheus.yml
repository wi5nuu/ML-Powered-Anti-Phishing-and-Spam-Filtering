global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "classifier"
    static_configs:
      - targets: ["classifier:8001"]
    metrics_path: /metrics

  - job_name: "dashboard"
    static_configs:
      - targets: ["dashboard:8080"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]
