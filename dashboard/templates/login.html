<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LTI Anti-Phishing</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <h2>LTI Anti-Phishing</h2>
        <div class="auth-error" id="auth-error"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-info" style="width:100%;justify-content:center;padding:12px;">
                Login
            </button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const params = new URLSearchParams();
            params.append('username', form.username.value);
            params.append('password', form.password.value);
            params.append('grant_type', 'password');
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: params,
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    document.getElementById('auth-error').textContent = err.detail || 'Login failed';
                    document.getElementById('auth-error').style.display = 'block';
                    return;
                }
                window.location.href = '/';
            } catch (err) {
                document.getElementById('auth-error').textContent = 'Network error';
                document.getElementById('auth-error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
