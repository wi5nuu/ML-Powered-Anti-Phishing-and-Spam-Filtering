# ═══════════════════════════════════════════════════════════════════════════
# CogniMail — Development Docker Compose Override
# ═══════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (Dev - no resource limits) ───────────────────────────────
  postgres:
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ── Redis (Dev - no resource limits) ────────────────────────────────────
  redis:
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ── Classifier (Hot-reload + debug) ─────────────────────────────────────
  classifier:
    build:
      args:
        DEV_MODE: "true"
    image: cognimail/classifier:dev
    environment:
      ENV: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ./classifier:/app/classifier:ro
      - ./decision_engine:/app/decision_engine:ro
      - ./database:/app/database:ro
      - ./classifier/models:/app/classifier/models:ro
      - ./worker:/app/worker:ro
    command: ["uvicorn", "classifier.predict:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ── Worker (Hot-reload) ────────────────────────────────────────────────
  worker:
    image: cognimail/worker:dev
    build:
      args:
        DEV_MODE: "true"
    environment:
      ENV: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ./worker:/app/worker:ro
      - ./decision_engine:/app/decision_engine:ro
      - ./database:/app/database:ro
      - ./ingestion:/app/ingestion:ro
      - ./classifier:/app/classifier:ro
    command: ["python", "-m", "worker.pipeline_worker"]
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ── SMTP Receiver (Hot-reload) ─────────────────────────────────────────
  smtp_receiver:
    image: cognimail/worker:dev
    environment:
      ENV: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ./worker:/app/worker:ro
      - ./decision_engine:/app/decision_engine:ro
      - ./ingestion:/app/ingestion:ro
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ── Dashboard (Hot-reload + debug) ─────────────────────────────────────
  dashboard:
    image: cognimail/dashboard:dev
    build:
      args:
        DEV_MODE: "true"
    environment:
      ENV: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      DB_URL: sqlite:///./cognimail.db
      DB_SYNC_URL: sqlite:///./cognimail.db
      DASHBOARD_DB_URL: sqlite:///./cognimail.db
    volumes:
      - ./dashboard:/app/dashboard:ro
      - ./database:/app/database:ro
      - ./frontend:/app/frontend:ro
      - ./src:/app/src:ro
      - cognimail_dev_db:/app
    command: ["uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ── Prometheus (Dev - shorter retention) ────────────────────────────────
  prometheus:
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

# ═══════════════════════════════════════════════════════════════════════════
# Dev Volumes
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  cognimail_dev_db:
    driver: local
