services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  spamassassin:
    image: instantlinux/spamassassin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SPAMASSASSIN_PUBLIC_PORT:-783}:783"
    volumes:
      - sa_rules:/var/lib/spamassassin
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e '$$s=IO::Socket::INET->new(PeerAddr=>\"127.0.0.1\",PeerPort=>783,Proto=>\"tcp\"); exit($$s?0:1)'"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cognimail}
      POSTGRES_USER: ${DB_USER:-cogniuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cogniuser} -d ${POSTGRES_DB:-cognimail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  classifier:
    build:
      context: .
      dockerfile: docker/Dockerfile.classifier
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: ${ENV:-production}
    ports:
      - "127.0.0.1:${CLASSIFIER_PORT:-8001}:8001"
    volumes:
      - ./classifier/models:/app/classifier/models:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: ${ENV:-production}
      REDIS_URL: redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      classifier:
        condition: service_started
      spamassassin:
        condition: service_healthy

  smtp_receiver:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: ${ENV:-production}
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "worker.smtp_receiver"]
    ports:
      - "${SMTP_PUBLIC_PORT:-2525}:${SMTP_PORT:-25}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
      args:
        VITE_MAIL_DOMAIN: ${VITE_MAIL_DOMAIN:-zenime.my.id}
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: ${ENV:-production}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8080}:8080"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-cogniuser}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-cognimail}?sslmode=disable
    command:
      - "--no-collector.stat_replication"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file: .env
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${ADMIN_USERNAME:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production"]
    env_file: .env
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./monitoring/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - grafana
      - prometheus

  node_exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    profiles: ["production"]
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: ["local"]
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  redis_data:
  pgdata:
  sa_rules:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
