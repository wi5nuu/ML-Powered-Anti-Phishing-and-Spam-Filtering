version: "3.9"

services:

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  spamassassin:
    image: instantlinux/spamassassin:latest
    ports: ["783:783"]
    volumes:
      - sa_rules:/var/lib/spamassassin
    healthcheck:
      test: ["CMD", "spamc", "-R", "-c"]
      interval: 30s
      timeout: 10s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"  # SMTP untuk terima email
      - "1143:1143"  # IMAP untuk fetcher
      - "8025:8025"  # Web UI untuk melihat email
    environment:
      MP_IMAP_AUTH_ALLOW_INSECURE: "true"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lti_antiphishing
      POSTGRES_USER: ${DB_USER:-ltiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ltiuser}"]
      interval: 10s
      retries: 5

  classifier:
    build:
      context: .
      dockerfile: docker/Dockerfile.classifier
    ports: ["8001:8001"]
    volumes:
      - ./classifier/models:/app/classifier/models
    env_file: .env
    depends_on:
      redis: {condition: service_healthy}

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    depends_on:
      redis: {condition: service_healthy}
      classifier: {condition: service_started}
      spamassassin: {condition: service_healthy}
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports: ["8080:8080"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  pgdata:
  sa_rules:
