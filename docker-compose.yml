version: "3.9"

services:

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  spamassassin:
    image: instantlinux/spamassassin:latest
    ports: ["783:783"]
    volumes:
      - sa_rules:/var/lib/spamassassin
    healthcheck:
      test: ["CMD", "spamc", "-R", "-c"]
      interval: 30s
      timeout: 10s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "1143:1143"
      - "8025:8025"
    environment:
      MP_IMAP_AUTH_ALLOW_INSECURE: "true"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lti_antiphishing
      POSTGRES_USER: ${DB_USER:-ltiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ltiuser}"]
      interval: 10s
      retries: 5

  classifier:
    build:
      context: .
      dockerfile: docker/Dockerfile.classifier
    ports: ["8001:8001"]
    volumes:
      - ./classifier/models:/app/classifier/models
    env_file: .env
    depends_on:
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    depends_on:
      redis: {condition: service_healthy}
      classifier: {condition: service_started}
      spamassassin: {condition: service_healthy}
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports: ["8080:8080"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: ${ADMIN_USERNAME:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    depends_on:
      - prometheus

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - dashboard
      - grafana

  node_exporter:
    image: prom/node-exporter:latest
    ports: ["9100:9100"]
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"

volumes:
  pgdata:
  sa_rules:
  prometheus_data:
  grafana_data:
  caddy_data:
